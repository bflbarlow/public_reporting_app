<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Cosmic Insights</title>
    <script src="/static/thick_client.js"></script>

  <link rel="stylesheet" href="/static/reporting_app.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Inter, sans-serif;
      color: #e8ecff;
      background: radial-gradient(circle at 20% 20%, #1b1d3c, #0b0c1a 70%);
      overflow-x: hidden;
    }

    /* HERO */
    .hero {
      padding: 6rem 2rem 4rem;
      text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0));
    }

    .hero h1 {
      font-size: 4rem;
      letter-spacing: 3px;
      margin: 0;
      background: linear-gradient(90deg, #9bb8ff, #d7aaff, #ffb3f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 20px rgba(150,120,255,0.4));
    }

    .hero p {
      margin-top: 1rem;
      font-size: 1.3rem;
      opacity: 0.85;
    }

    /* SECTION */
    .section {
      margin: 3rem auto;
      width: min(1100px, 90%);
      padding: 2.5rem;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(120, 80, 255, 0.15);
    }

    .section h2 {
      margin-top: 0;
      font-size: 2rem;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #b6c8ff, #e7caff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .divider {
      height: 2px;
      width: 100%;
      margin: 1.5rem 0 2rem;
      background: linear-gradient(90deg, transparent, #8ab4ff, transparent);
      opacity: 0.5;
    }

    /* KPI GRID */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .kpi-card {
      padding: 1.5rem;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      text-align: center;
      box-shadow: inset 0 0 20px rgba(255,255,255,0.05);
    }

    .kpi-value {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }

    .kpi-label {
      font-size: 0.9rem;
      opacity: 0.8;
    }

    /* CHART */
    .chart-container {
      width: 100%;
      height: 380px;
      margin: 0 auto;
      border-radius: 16px;
      padding: 1rem;
      background: rgba(255,255,255,0.03);
      box-shadow: inset 0 0 20px rgba(255,255,255,0.05);
    }

    /* TABLE */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.95rem;
    }

    table th {
      text-align: left;
      padding: 0.75rem;
      background: rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.15);
      letter-spacing: 0.5px;
    }

    table td {
      padding: 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      opacity: 0.9;
    }

    table tr:hover {
      background: rgba(255,255,255,0.06);
      transition: background 0.25s ease;
    }

    /* STARFIELD */
    #starfield {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* LOADING OVERLAY */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 20%, #1b1d3c, #0b0c1a 70%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loading-spinner {
      width: 80px;
      height: 80px;
      border: 4px solid transparent;
      border-top-color: #9bb8ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 20px rgba(155, 184, 255, 0.6);
    }

    .loading-text {
      margin-top: 20px;
      font-size: 1.2rem;
      color: #b6c8ff;
      letter-spacing: 2px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* DIMENSION SELECTOR */
    .dimension-selector {
      margin-top: 1.5rem;
    }

    .dimension-selector label {
      font-size: 1rem;
      opacity: 0.9;
      margin-right: 10px;
    }

    .dimension-selector select {
      background: rgba(255,255,255,0.1);
      color: #e8ecff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 1rem;
      backdrop-filter: blur(10px);
      cursor: pointer;
    }

    .dimension-selector select:hover {
      background: rgba(255,255,255,0.15);
    }

    /* ERROR MESSAGE */
    .error-message {
      background: rgba(255, 80, 80, 0.2);
      border-left: 4px solid #ff5555;
      padding: 20px;
      margin: 20px auto;
      width: min(1100px, 90%);
      border-radius: 8px;
      display: none;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(255, 80, 80, 0.3);
    }
  </style>
</head>

<body>
  <canvas id="starfield"></canvas>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Launching Cosmic Insights...</div>
  </div>
  <div class="error-message" id="errorMessage"></div>

  <div class="hero">
    <h1>🌌 Cosmic Insights</h1>
    <div class="dimension-selector">
      <label for="dimension">View by:</label>
      <select id="dimension">
        <option value="category" selected>Product Category</option>
        <option value="region">Customer Region</option>
        <option value="status">Order Status</option>
      </select>
    </div>
    <p id="dimension_label" style="margin-top: 0.5rem; font-size: 1rem; opacity: 0.8;"></p>
  </div>

  <!-- KPI CONSTELLATION -->
  <div class="section">
    <h2>Constellation of KPIs</h2>
    <div class="divider"></div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-value" id="kpi_total_count">—</div>
        <div class="kpi-label">Total Records</div>
      </div>

      <div class="kpi-card">
        <div class="kpi-value" id="kpi_total_amount">—</div>
        <div class="kpi-label">Total Amount</div>
      </div>

      <div class="kpi-card">
        <div class="kpi-value" id="kpi_avg_amount">—</div>
        <div class="kpi-label">Average Amount</div>
      </div>
    </div>

    <div class="chart-container">
      <canvas id="kpi_constellation"></canvas>
    </div>
  </div>

  <!-- NEBULA TIME SERIES -->
  <div class="section">
    <h2>Nebula Time Series</h2>
    <div class="divider"></div>
    <div class="chart-container">
      <canvas id="nebula_timeseries"></canvas>
    </div>
  </div>

  <!-- TABLE -->
  <div class="section">
    <h2>Gravity Table</h2>
    <div class="divider"></div>
    <div id="cosmic_table"></div>
  </div>

  <!-- External JS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Main script -->
  <script>
    // Starfield animation
    const starfieldCanvas = document.getElementById('starfield');
    if (starfieldCanvas) {
      const ctx = starfieldCanvas.getContext('2d');
      const stars = [];
      const starCount = 150;
      for (let i = 0; i < starCount; i++) {
        stars.push({
          x: Math.random() * starfieldCanvas.width,
          y: Math.random() * starfieldCanvas.height,
          size: Math.random() * 2 + 0.5,
          speed: Math.random() * 0.5 + 0.1
        });
      }
      function drawStars() {
        ctx.clearRect(0, 0, starfieldCanvas.width, starfieldCanvas.height);
        stars.forEach(star => {
          star.y -= star.speed;
          if (star.y < 0) star.y = starfieldCanvas.height;
          ctx.beginPath();
          ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
          ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
          ctx.fill();
        });
      }
      function resizeCanvas() {
        starfieldCanvas.width = window.innerWidth;
        starfieldCanvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      setInterval(drawStars, 30);
    }

    // Report data handling
    let charts = {};
    let currentDimension = 'category';

    function showError(message) {
      const errorEl = document.getElementById('errorMessage');
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMessage').style.display = 'none';
    }

    function showLoading() {
      document.getElementById('loadingOverlay').style.display = 'flex';
    }

    function hideLoading() {
      document.getElementById('loadingOverlay').style.display = 'none';
    }

    async function refreshData(params = {}) {
      try {
        showLoading();
        const data = await window.ReportApp.refresh(params);
        hideLoading();
        hideError();
        return data;
      } catch (error) {
        hideLoading();
        showError('Failed to load data: ' + error.message);
        throw error;
      }
    }

    function updateKPIs(data) {
      const kpiRows = data.cosmic_kpis?.rows || [];
      let totalCount = 0;
      let totalAmount = 0;
      let avgAmount = 0;
      kpiRows.forEach(row => {
        totalCount += parseInt(row[1], 10) || 0;
        totalAmount += parseFloat(row[2]) || 0;
      });
      if (kpiRows.length > 0) {
        avgAmount = totalAmount / totalCount;
      }
      document.getElementById('kpi_total_count').textContent = totalCount.toLocaleString();
      document.getElementById('kpi_total_amount').textContent = '$' + totalAmount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      document.getElementById('kpi_avg_amount').textContent = '$' + avgAmount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function renderDoughnutChart(data) {
      const canvas = document.getElementById('kpi_constellation');
      if (!canvas) return;
      
      // Check if Chart.js is loaded
      if (typeof Chart === 'undefined') {
        console.error('Chart.js not loaded. Cannot render doughnut chart.');
        showError('Chart.js library failed to load. Please refresh the page.');
        return;
      }
      
      const rows = data.cosmic_kpis?.rows || [];
      const labels = rows.map(row => row[0]);
      const values = rows.map(row => parseInt(row[1], 10) || 0);
      if (charts.kpi_constellation) charts.kpi_constellation.destroy();
      charts.kpi_constellation = new Chart(canvas, {
        type: 'doughnut',
        data: {
          labels: labels,
          datasets: [{
            data: values,
            backgroundColor: [
              '#9bb8ff', '#d7aaff', '#ffb3f9', '#b6c8ff', '#8ab4ff',
              '#636efa', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'
            ],
            borderWidth: 2,
            borderColor: 'rgba(255,255,255,0.1)'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '70%',
          plugins: {
            legend: { position: 'bottom' }
          }
        }
      });
    }

    function renderLineChart(data) {
      const canvas = document.getElementById('nebula_timeseries');
      if (!canvas) return;
      
      // Check if Chart.js is loaded
      if (typeof Chart === 'undefined') {
        console.error('Chart.js not loaded. Cannot render line chart.');
        return;
      }
      
      const rows = data.cosmic_timeseries?.rows || [];
      const labels = rows.map(row => row[0]);
      const values = rows.map(row => parseFloat(row[2]) || 0);
      if (charts.nebula_timeseries) charts.nebula_timeseries.destroy();
      charts.nebula_timeseries = new Chart(canvas, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Total Amount',
            data: values,
            fill: true,
            borderColor: '#9bb8ff',
            backgroundColor: 'rgba(155, 184, 255, 0.2)',
            tension: 0.4,
            borderWidth: 3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          }
        }
      });
    }

    function renderTable(data) {
      const container = document.getElementById('cosmic_table');
      if (!container) return;
      const rows = data.cosmic_table?.rows || [];
      const columns = data.cosmic_table?.columns || ['id', 'customer_name', 'dim', 'amount', 'created_at'];
      let html = '<table><thead><tr>';
      columns.forEach(col => {
        html += '<th>' + col.replace('_', ' ') + '</th>';
      });
      html += '</tr></thead><tbody>';
      rows.forEach(row => {
        html += '<tr>';
        row.forEach((cell, idx) => {
          if (idx === columns.indexOf('amount')) {
            html += '<td>$' + parseFloat(cell).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '</td>';
          } else if (idx === columns.indexOf('created_at')) {
            html += '<td>' + new Date(cell).toLocaleDateString() + '</td>';
          } else {
            html += '<td>' + cell + '</td>';
          }
        });
        html += '</tr>';
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function updateDimensionLabel(dimension) {
      const labelMap = {
        category: 'Product Category',
        region: 'Customer Region',
        status: 'Order Status'
      };
      document.getElementById('dimension_label').textContent = 'Currently viewing by ' + labelMap[dimension];
    }

    async function loadReport() {
      const dimensionSelect = document.getElementById('dimension');
      const dimension = dimensionSelect ? dimensionSelect.value : 'category';
      currentDimension = dimension;
      updateDimensionLabel(dimension);
      const data = await refreshData({ dimension });
      updateKPIs(data);
      renderDoughnutChart(data);
      renderLineChart(data);
      renderTable(data);
    }

    // Check if Chart.js is loaded before initializing
    function checkChartJSLoaded() {
      if (typeof Chart === 'undefined') {
        console.error('Chart.js not loaded. Check if CDN is accessible.');
        showError('Visualization library failed to load. Please check internet connection.');
        return false;
      }
      console.log('Chart.js loaded successfully:', typeof Chart);
      return true;
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', async function() {
      console.log('DOM loaded, initializing Cosmic Insights...');
      
      if (!window.ReportApp || typeof window.ReportApp.refresh !== 'function') {
        showError('Thick client not available. Please access via reporting app.');
        return;
      }
      
      // Check Chart.js
      if (!checkChartJSLoaded()) {
        return;
      }
      
      const dimensionSelect = document.getElementById('dimension');
      if (dimensionSelect) {
        dimensionSelect.addEventListener('change', loadReport);
      }
      
      await loadReport();
      
      // Hide loading overlay after a moment
      setTimeout(() => {
        document.getElementById('loadingOverlay').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('loadingOverlay').style.display = 'none';
        }, 500);
      }, 1000);
    });
  </script>

</body>
</html>
